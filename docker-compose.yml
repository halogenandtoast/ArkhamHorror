services:
  # redis:
  #   image: redis:latest
  #   ports:
  #     - "6379:6379"
  #   command: redis-server
  #   volumes:
  #     - redis-data:/data
  db:
    image: postgres:14.6-alpine
    restart: always
    environment:
      - POSTGRES_USER=arkham_pg_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=arkham-horror-backend
    ports:
      # Bind to localhost only to prevent external access.
      # Host port is configurable (DB_PORT in .env) to avoid collisions; the
      # app never uses it — it reaches db over the compose network at db:5432.
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    user: postgres
    cap_drop:
      - ALL
    mem_limit: 512M
    cpus: '0.5'
    volumes:
      - pgdata:/var/lib/postgresql/data:rw
      - ./setup.sql:/docker-entrypoint-initdb.d/create_tables.sql:ro
    secrets:
      - postgres_password
    # Ready only once Postgres actually accepts connections. initdb (which
    # imports setup.sql) runs a temp local-only server first, so the port isn't
    # reachable until real startup — start_period covers a slow first import.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 120s
  # One-shot: applies pending SQL migrations, then exits. `web` waits for it.
  migrate:
    image: postgres:14.6-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "/migrate.sh"]
    volumes:
      - ./migrations:/migrations:ro
      - ./migrate.sh:/migrate.sh:ro
    secrets:
      - postgres_password
  web:
    image: "halogenandtoast/arkham-horror:latest"
    build:
      context: .
      args:
        - GHC_VERSION=9.12.2
    # ASSET_HOST is auto-detected by web-entrypoint.sh:
    #   unset (default): uses local images if present, CDN otherwise
    # AUDIO_HOST is auto-detected the same way for optional local audio files.
    # To override, uncomment one of the lines below:
    # environment:
    #   - ASSET_HOST=                                 # force local images
    #   - ASSET_HOST=https://assets.arkhamhorror.app # force CDN
    #   - AUDIO_HOST=                                 # force local audio
    #   - AUDIO_HOST=https://assets.arkhamhorror.app # force CDN audio
    #   - REDIS_CONN=redis://redis:6379
    environment:
      - AUDIO_HOST=/
    secrets:
      - postgres_password
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./frontend/public/img:/opt/arkham/src/frontend/dist/img
      - ./frontend/public/audio/manifest.json:/opt/arkham/src/frontend/dist/audio/manifest.json
      - ./frontend/public/audio/cards:/opt/arkham/src/frontend/dist/audio/cards
  fetch-images:
    profiles: ["fetch-images"]
    image: amazon/aws-cli
    volumes:
      - ./frontend/public/img:/workspace/frontend/public/img
      - ./scripts/fetch-assets.sh:/workspace/scripts/fetch-assets.sh:ro
    entrypoint: ["/bin/bash", "/workspace/scripts/fetch-assets.sh"]
    command: en
  fetch-audio:
    profiles: ["fetch-audio"]
    image: amazon/aws-cli
    volumes:
      - ./frontend/public/audio:/workspace/frontend/public/audio
      - ./scripts/fetch-assets.sh:/workspace/scripts/fetch-assets.sh:ro
    entrypoint: ["/bin/bash", "/workspace/scripts/fetch-assets.sh"]
    command: audio
volumes:
 pgdata:
# Docker secret for Postgres password
secrets:
  postgres_password:
    file: ./config/postgres_password.txt
 # redis-data:
