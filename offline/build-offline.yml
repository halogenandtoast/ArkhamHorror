  # ═══════════════════════════════════════════════════════════════════════
  # Linux x86_64 (Ubuntu)
  # ═══════════════════════════════════════════════════════════════════════
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system C library dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential curl unzip libgmp-dev uuid-dev libpcre3-dev

      - name: Restore toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            offline/_tmp/
            offline/_deps/ghcup/
            offline/_deps/node/
