          restore-keys: |
            arkham-stack-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore frontend build cache
        uses: actions/cache@v4
        with:
          path: |
            offline/_deps/node_modules/
            offline/_deps/frontend/
          key: arkham-frontend-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            arkham-frontend-${{ runner.os }}-${{ runner.arch }}-

      - name: Make build scripts executable
        run: chmod +x offline/build_all.sh offline/scripts/*.sh

      - name: '[1/5] Install project dependencies (GHC / Stack / Node / PG / Nginx)'
        working-directory: offline
        run: bash scripts/01-check-project-deps.sh

      - name: '[2/5] Verify dependencies'
        working-directory: offline
        run: bash scripts/02-verify-deps.sh

      - name: '[3/5] Build frontend (Vite)'
        working-directory: offline
        run: bash scripts/03-build-frontend.sh

      - name: '[4/5] Build backend (Haskell / Stack)'
        working-directory: offline
        run: bash scripts/04-build-backend.sh

      - name: '[5/5] Package distribution'
        working-directory: offline
        run: bash scripts/05-package.sh

      - name: Upload distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: ArkhamHorror-linux-x86_64
          path: offline/_dist/ArkhamHorror-linux-x86_64.tar.gz
          if-no-files-found: error

