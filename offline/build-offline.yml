# =============================================================================
# build-offline.yml — Arkham Horror LCG offline build workflow
#
# Usage: copy to .github/workflows/build-offline.yml
#   cp offline/build-offline.yml .github/workflows/build-offline.yml
#
# Four-platform parallel build + two-layer cache:
#   Layer 1 (toolchains + downloads): key includes the build-script hash, changes rarely, and can be reused long-term
#   Layer 2 (build artifacts): key includes frontend/backend source hashes and is invalidated when the source changes
# Each build stage is split into an independent job step so progress is easier to inspect in the Actions UI
# =============================================================================

name: Build Offline Distribution

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'offline/**'
      - '.github/workflows/build-offline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'offline/**'
      - '.github/workflows/build-offline.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # macOS ARM64 (Apple Silicon)
  # ═══════════════════════════════════════════════════════════════════════
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system C library dependencies
        run: |
          brew install pcre gmp

      # Layer 1 cache: toolchains + downloads (versions are fixed and change rarely)
      - name: Restore toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            offline/_tmp/
            offline/_deps/ghcup/
            offline/_deps/node/
            offline/_deps/postgres/
            offline/_deps/nginx/
          key: arkham-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('offline/scripts/01-check-project-deps.sh') }}

      # Layer 2 cache: backend build artifacts (invalidated only when dependency declarations change; source changes are handled incrementally by Stack)
      - name: Restore backend build cache
        uses: actions/cache@v4
        with:
          path: |
            offline/_deps/stack-work/
            offline/_deps/stack-work-sub/
          key: arkham-stack-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('backend/stack.yaml', 'backend/stack.yaml.lock') }}
          restore-keys: |
            arkham-stack-${{ runner.os }}-${{ runner.arch }}-

      # Layer 3 cache: frontend build artifacts (invalidated only when package-lock.json changes)
      - name: Restore frontend build cache
        uses: actions/cache@v4
        with:
          path: |
            offline/_deps/node_modules/
            offline/_deps/frontend/
          key: arkham-frontend-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            arkham-frontend-${{ runner.os }}-${{ runner.arch }}-

      - name: Make build scripts executable
        run: chmod +x offline/build_all.sh offline/scripts/*.sh

      - name: '[1/5] Install project dependencies (GHC / Stack / Node / PG / Nginx)'
        working-directory: offline
        run: bash scripts/01-check-project-deps.sh

      - name: '[2/5] Verify dependencies'
        working-directory: offline
        run: bash scripts/02-verify-deps.sh

      - name: '[3/5] Build frontend (Vite)'
        working-directory: offline
        run: bash scripts/03-build-frontend.sh

      - name: '[4/5] Build backend (Haskell / Stack)'
        working-directory: offline
        run: bash scripts/04-build-backend.sh

      - name: '[5/5] Package distribution'
        working-directory: offline
        run: bash scripts/05-package.sh

      - name: Upload distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: ArkhamHorror-macos-arm64
          path: offline/_dist/ArkhamHorror-macos-arm64.tar.gz
          if-no-files-found: error

